<main class="paper-texture min-h-[calc(100vh-144px)] pb-24">

<div class="flex justify-center mb-6">
<div class="w-24 h-24 relative">
<div class="absolute inset-0 bg-primary opacity-5 rounded-full scale-125"></div>
<img alt="University Seal" class="w-full h-full object-contain mix-blend-multiply" data-alt="Intricate golden university seal with heraldic symbols and Latin text on a parchment background style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrA-xllm8VSWdScVG6TsleQSC17HPAGKzx0S7PviE5oQHefhxwzciYRuC_64R0YTeXRJ4MoGqASRbr9tR4Feoas-PDETDur1o6YJy8bXOadkSxqcj7kPVGRfzs11kcC8bt1tYAeYiFrEg8MV-641-hcjy31I0eYHd8bLMSi3LfDHQucQ6WxLTMhtLJ6zMlfw0hErqpftc37IQ23TYeaNm5POyEQsXhDLsKYOs3Jpl7R07YgD7E4UsI4KDr5AN5OrcFO5WBWc-fYjc"/>

<h2 class="display-sm font-black text-primary tracking-tight text-3xl mb-2">Create Admin Account</h2>
<p class="text-on-surface-variant body-md opacity-80 px-4">Register a new administrative profile for the Aldersgate institutional database.</p>
</section>
<!-- Form Section -->
<section class="px-6 mt-4">
<div class="space-y-6">
<!-- Profile Section -->
<div class="space-y-4">
<h3 class="label-md font-bold uppercase tracking-widest text-primary border-b border-outline-variant/30 pb-2">Institutional Identity</h3>
<div class="space-y-4">
<div class="relative">
<label class="label-md text-primary font-semibold mb-1 block">Full Name</label>
<input class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg px-4 py-3 transition-colors" placeholder="e.g. Dr. Julianne Sterling" type="text"/>
</div>
<div class="relative">
<label class="label-md text-primary font-semibold mb-1 block">Institutional ID</label>
<input class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg px-4 py-3 transition-colors" placeholder="AG-2024-0000" type="text"/>
</div>
<div class="relative">
<label class="label-md text-primary font-semibold mb-1 block">Email Address</label>
<input class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg px-4 py-3 transition-colors" placeholder="j.sterling@aldersgate.edu" type="email"/>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="relative">
<label class="label-md text-primary font-semibold mb-1 block">Department</label>
<select class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg px-4 py-3 transition-colors appearance-none">
<option>Select Department</option>
<option>Faculty of Humanities</option>
<option>School of Applied Sciences</option>
<option>Registrar's Office</option>
<option>Finance &amp; Budget</option>
</select>
</div>
<div class="relative">
<label class="label-md text-primary font-semibold mb-1 block">Administrative Role</label>
<select class="w-full bg-surface-container-low border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg px-4 py-3 transition-colors appearance-none">
<option>Select Role</option>
<option>Department Head</option>
<option>Academic Coordinator</option>
<option>Senior Registrar</option>
<option>IT Administrator</option>
</select>
</div>
</div>
</div>
</div>
<!-- Permissions Section -->
<div class="space-y-4 pt-4">
<h3 class="label-md font-bold uppercase tracking-widest text-primary border-b border-outline-variant/30 pb-2">Access Privileges</h3>
<div class="grid grid-cols-1 gap-3">
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 active:scale-[0.98] transition-transform">
<input checked="" class="w-6 h-6 rounded border-outline text-primary focus:ring-primary-container" type="checkbox"/>
<div class="ml-4">
<span class="block font-bold text-on-surface">Academic Records View</span>
<span class="text-xs text-on-surface-variant">Access to student transcripts and grading</span>
</div>
</label>
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 active:scale-[0.98] transition-transform">
<input class="w-6 h-6 rounded border-outline text-primary focus:ring-primary-container" type="checkbox"/>
<div class="ml-4">
<span class="block font-bold text-on-surface">Faculty Management</span>
<span class="text-xs text-on-surface-variant">Manage staff profiles and assignments</span>
</div>
</label>
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 active:scale-[0.98] transition-transform">
<input class="w-6 h-6 rounded border-outline text-primary focus:ring-primary-container" type="checkbox"/>
<div class="ml-4">
<span class="block font-bold text-on-surface">System Audit Logs</span>
<span class="text-xs text-on-surface-variant">Review historical changes and login data</span>
</div>
</label>
</div>
</div>

<div class="flex flex-col gap-3 pt-8">
<button class="signature-gradient text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all text-center">
                        Create Admin Account
                    </button>
<button class="bg-surface-container-high text-primary font-bold py-4 rounded-xl active:scale-95 transition-all text-center">
                        Cancel

</div>

<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-inter">Directory</span>
</a>
<a class="flex flex-col items-center justify-center text-[#fff9ec]/60 px-4 py-2 transition-colors duration-200 hover:bg-[#1a4d2a]" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-inter">Reports</span>
</a>
